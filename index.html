<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jewellery by Arabi</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8cc7a;
      --gold-pale: #f5e9c8;
      --dark: #1a1410;
      --dark2: #2a1f14;
      --cream: #faf6ef;
      --text: #3d2e1e;
      --text-light: #7a6a55;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── CURSOR ── */
    body { cursor: none; }
    #cursor {
      position: fixed; width: 10px; height: 10px;
      background: var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: multiply;
    }
    #cursor-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1.5px solid var(--gold); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: transform 0.12s ease, width 0.2s, height 0.2s;
    }
    body:has(a:hover) #cursor, body:has(button:hover) #cursor { width: 20px; height: 20px; background: var(--gold-light); }
    body:has(a:hover) #cursor-ring, body:has(button:hover) #cursor-ring { width: 56px; height: 56px; border-color: var(--gold-light); }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 48px;
      background: transparent;
      transition: background 0.4s, padding 0.4s;
    }
    nav.scrolled { background: rgba(250,246,239,0.96); backdrop-filter: blur(8px); padding: 14px 48px; border-bottom: 1px solid rgba(201,168,76,0.2); }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 300; letter-spacing: 0.08em;
      color: var(--dark); text-decoration: none;
    }
    .nav-logo span { color: var(--gold); font-style: italic; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.8rem;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--text);
      text-decoration: none; position: relative; transition: color 0.2s;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--gold); transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }
    .nav-dm {
      background: var(--gold); color: #fff; border: none; cursor: none;
      padding: 10px 24px; font-family: 'Jost', sans-serif;
      font-size: 0.75rem; font-weight: 400; letter-spacing: 0.18em;
      text-transform: uppercase; text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-dm:hover { background: var(--dark); transform: translateY(-1px); }

    /* ── HERO ── */
    #hero {
      min-height: 100vh; display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative; overflow: hidden;
    }
    .hero-left {
      display: flex; flex-direction: column;
      justify-content: center; padding: 120px 60px 80px 80px;
      position: relative; z-index: 2;
    }
    .hero-tag {
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold); font-weight: 400; margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .hero-tag::before { content: ''; display: block; width: 40px; height: 1px; background: var(--gold); }
    .hero-h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.2rem, 6vw, 6rem);
      font-weight: 300; line-height: 1.05; letter-spacing: -0.01em;
      color: var(--dark); margin-bottom: 28px;
    }
    .hero-h1 em { font-style: italic; color: var(--gold); }
    .hero-p {
      font-weight: 300; font-size: 1rem; line-height: 1.8;
      color: var(--text-light); max-width: 400px; margin-bottom: 44px;
    }
    .hero-cta {
      display: inline-flex; align-items: center; gap: 16px;
      background: var(--dark); color: var(--gold-pale);
      padding: 16px 36px; text-decoration: none;
      font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
      font-weight: 400; transition: all 0.25s;
    }
    .hero-cta svg { transition: transform 0.25s; }
    .hero-cta:hover { background: var(--gold); color: #fff; }
    .hero-cta:hover svg { transform: translateX(5px); }
    .hero-right {
      position: relative; overflow: hidden;
      background: var(--dark2);
    }
    .hero-mosaic {
      position: absolute; inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 3px;
    }
    .hero-mosaic .tile {
      overflow: hidden; position: relative;
      background: var(--dark);
    }
    .hero-mosaic .tile:first-child { grid-row: span 2; }
    .hero-mosaic .tile img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.7s ease; opacity: 0.88;
    }
    .hero-mosaic .tile:hover img { transform: scale(1.06); opacity: 1; }
    .hero-scroll-hint {
      position: absolute; bottom: 40px; left: 80px;
      display: flex; align-items: center; gap: 10px;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-light); z-index: 2;
      animation: fadeInUp 1s 1s both;
    }
    .hero-scroll-hint .line {
      width: 1px; height: 40px; background: var(--gold);
      animation: lineGrow 1.5s 1.2s both;
    }
    @keyframes lineGrow { from { height: 0; } to { height: 40px; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* decorative circle */
    .hero-circle {
      position: absolute; width: 420px; height: 420px;
      border: 1px solid rgba(201,168,76,0.18); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none; z-index: 1;
      animation: rotateSlow 30s linear infinite;
    }
    @keyframes rotateSlow { to { transform: translate(-50%,-50%) rotate(360deg); } }
    .hero-circle::before {
      content: '◆'; position: absolute; top: 0; left: 50%;
      transform: translateX(-50%) translateY(-50%);
      color: var(--gold); font-size: 0.6rem;
    }

    /* ── MARQUEE ── */
    .marquee-wrap {
      background: var(--gold); padding: 14px 0; overflow: hidden;
    }
    .marquee-track {
      display: flex; width: max-content;
      animation: marquee 22s linear infinite;
    }
    .marquee-item {
      white-space: nowrap; font-size: 0.75rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--dark);
      padding: 0 36px;
      font-weight: 400;
    }
    .marquee-sep { color: rgba(26,20,16,0.4); }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── SECTION COMMON ── */
    section { padding: 100px 80px; }
    .section-label {
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold); font-weight: 400; margin-bottom: 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label::before { content: ''; display: block; width: 30px; height: 1px; background: var(--gold); }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 4vw, 3.8rem);
      font-weight: 300; line-height: 1.1; color: var(--dark);
      margin-bottom: 16px;
    }
    .section-title em { font-style: italic; color: var(--gold); }
    .section-sub {
      font-weight: 300; color: var(--text-light);
      font-size: 0.95rem; line-height: 1.8; max-width: 520px;
      margin-bottom: 60px;
    }

    /* ── COLLECTIONS ── */
    #collections { background: var(--cream); }
    .collection-filters {
      display: flex; gap: 10px; margin-bottom: 48px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 22px; border: 1px solid rgba(201,168,76,0.4);
      background: transparent; color: var(--text-light);
      font-family: 'Jost', sans-serif; font-size: 0.72rem;
      letter-spacing: 0.16em; text-transform: uppercase; cursor: none;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--gold); border-color: var(--gold); color: #fff;
    }
    .collection-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .product-card {
      position: relative; overflow: hidden; background: #fff;
      box-shadow: 0 4px 24px rgba(26,20,16,0.06);
      transition: transform 0.35s, box-shadow 0.35s;
      cursor: none;
    }
    .product-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(26,20,16,0.13); }
    .product-card:nth-child(3n+1) { grid-row: span 1; }
    .product-card.tall { grid-row: span 2; }
    .product-img-wrap { position: relative; overflow: hidden; aspect-ratio: 3/4; }
    .product-card.tall .product-img-wrap { aspect-ratio: auto; height: 100%; min-height: 480px; }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
    .product-card:hover .product-img-wrap img { transform: scale(1.07); }
    .product-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,20,16,0.72) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: flex-end; padding: 28px;
    }
    .product-card:hover .product-overlay { opacity: 1; }
    .product-overlay-inner { color: #fff; }
    .product-overlay-inner p { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; opacity: 0.75; }
    .product-overlay-inner h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; }
    .product-info { padding: 18px 20px; }
    .product-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 4px; }
    .product-info p { font-size: 0.78rem; color: var(--text-light); letter-spacing: 0.06em; }
    .product-dm-btn {
      display: block; width: 100%; padding: 12px;
      background: var(--dark); color: var(--gold-pale);
      border: none; font-family: 'Jost', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      cursor: none; text-align: center; text-decoration: none;
      transition: background 0.2s;
    }
    .product-dm-btn:hover { background: var(--gold); color: #fff; }

    /* ── ABOUT / STORY ── */
    #story {
      background: var(--dark);
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
      align-items: center;
    }
    #story .section-label { color: var(--gold-light); }
    #story .section-title { color: var(--cream); }
    #story .section-sub { color: rgba(250,246,239,0.6); margin-bottom: 36px; }
    .story-img-stack {
      position: relative; height: 540px;
    }
    .story-img-stack img {
      position: absolute; object-fit: cover;
      border: 3px solid var(--dark2);
    }
    .story-img-stack img:nth-child(1) { width: 72%; height: 75%; top: 0; left: 0; }
    .story-img-stack img:nth-child(2) { width: 55%; height: 58%; bottom: 0; right: 0; border-color: var(--gold); }
    .story-img-stack::after {
      content: ''; position: absolute;
      width: 180px; height: 180px;
      border: 1px solid rgba(201,168,76,0.3); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .story-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 300; font-style: italic;
      color: var(--gold-light); line-height: 1.5;
      border-left: 2px solid var(--gold);
      padding-left: 24px; margin-bottom: 36px;
    }

    /* ── INSTAGRAM CTA STRIP ── */
    .ig-cta-strip {
      background: linear-gradient(135deg, var(--gold) 0%, #b8902a 100%);
      padding: 60px 80px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 40px; flex-wrap: wrap;
    }
    .ig-cta-strip .left h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem; font-weight: 300; color: var(--dark);
      margin-bottom: 8px;
    }
    .ig-cta-strip .left p { font-size: 0.9rem; color: rgba(26,20,16,0.7); font-weight: 300; }
    .ig-btn {
      display: inline-flex; align-items: center; gap: 12px;
      background: var(--dark); color: var(--gold-pale);
      padding: 16px 36px; text-decoration: none;
      font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase;
      font-weight: 400; white-space: nowrap; transition: all 0.25s;
    }
    .ig-btn:hover { background: #fff; color: var(--dark); }
    .ig-btn svg { width: 20px; height: 20px; }

    /* ── GALLERY MASONRY ── */
    #gallery { background: var(--cream); }
    .masonry-grid {
      columns: 4; column-gap: 16px;
    }
    .masonry-item {
      break-inside: avoid; margin-bottom: 16px;
      overflow: hidden; position: relative; cursor: none;
    }
    .masonry-item img { width: 100%; display: block; transition: transform 0.5s; }
    .masonry-item:hover img { transform: scale(1.04); }
    .masonry-overlay {
      position: absolute; inset: 0; background: rgba(26,20,16,0.5);
      opacity: 0; transition: opacity 0.3s;
      display: flex; align-items: center; justify-content: center;
    }
    .masonry-item:hover .masonry-overlay { opacity: 1; }
    .masonry-overlay span {
      color: #fff; font-size: 0.7rem; letter-spacing: 0.25em;
      text-transform: uppercase; font-weight: 400;
    }

    /* ── HOW TO ORDER ── */
    #order {
      background: var(--dark2);
      text-align: center;
    }
    #order .section-label { justify-content: center; }
    #order .section-label::before { display: none; }
    #order .section-title { text-align: center; color: var(--cream); margin: 0 auto 12px; }
    #order .section-sub { margin: 0 auto 60px; color: rgba(250,246,239,0.55); text-align: center; }
    .steps-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; margin-bottom: 56px; }
    .step {
      padding: 36px 24px; border: 1px solid rgba(201,168,76,0.18);
      position: relative; transition: border-color 0.3s, transform 0.3s;
    }
    .step:hover { border-color: var(--gold); transform: translateY(-4px); }
    .step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem; font-weight: 300; color: rgba(201,168,76,0.18);
      line-height: 1; margin-bottom: 16px;
    }
    .step h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 400; color: var(--cream);
      margin-bottom: 10px;
    }
    .step p { font-size: 0.82rem; color: rgba(250,246,239,0.5); line-height: 1.7; font-weight: 300; }
    .step-icon { font-size: 1.8rem; margin-bottom: 12px; }
    .order-final-btn {
      display: inline-flex; align-items: center; gap: 14px;
      background: var(--gold); color: var(--dark);
      padding: 18px 48px; text-decoration: none;
      font-size: 0.85rem; letter-spacing: 0.22em; text-transform: uppercase;
      font-weight: 500; transition: all 0.25s;
    }
    .order-final-btn:hover { background: #fff; }

    /* ── TESTIMONIALS ── */
    #testimonials { background: var(--cream); text-align: center; }
    #testimonials .section-label { justify-content: center; }
    #testimonials .section-label::before { display: none; }
    #testimonials .section-title { text-align: center; margin: 0 auto 56px; }
    .testimonials-track { display: flex; gap: 28px; overflow: hidden; }
    .testimonial-card {
      flex: 0 0 calc(33.333% - 20px); padding: 40px 36px;
      border: 1px solid rgba(201,168,76,0.2); background: #fff;
      text-align: left; position: relative;
    }
    .testimonial-card::before {
      content: '"'; position: absolute; top: 20px; right: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem; color: rgba(201,168,76,0.15); line-height: 1;
    }
    .stars { color: var(--gold); font-size: 0.85rem; letter-spacing: 3px; margin-bottom: 18px; }
    .testimonial-card p { font-style: italic; line-height: 1.8; font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; color: var(--text); margin-bottom: 24px; }
    .testimonial-author { font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-light); font-weight: 400; }

    /* ── FOOTER ── */
    footer {
      background: var(--dark); padding: 60px 80px 32px;
    }
    .footer-top {
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px; margin-bottom: 48px;
      padding-bottom: 48px; border-bottom: 1px solid rgba(201,168,76,0.12);
    }
    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem; font-weight: 300; color: var(--cream);
      margin-bottom: 16px;
    }
    .footer-logo span { color: var(--gold); font-style: italic; }
    .footer-about { font-size: 0.82rem; color: rgba(250,246,239,0.45); line-height: 1.8; font-weight: 300; margin-bottom: 24px; }
    .footer-social { display: flex; gap: 12px; }
    .footer-social a {
      width: 36px; height: 36px; border: 1px solid rgba(201,168,76,0.3);
      display: grid; place-items: center;
      color: var(--gold); text-decoration: none; font-size: 0.75rem;
      transition: all 0.2s;
    }
    .footer-social a:hover { background: var(--gold); color: var(--dark); border-color: var(--gold); }
    .footer-col h5 {
      font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); font-weight: 400; margin-bottom: 20px;
    }
    .footer-col ul { list-style: none; }
    .footer-col ul li { margin-bottom: 10px; }
    .footer-col ul li a {
      font-size: 0.82rem; color: rgba(250,246,239,0.45);
      text-decoration: none; font-weight: 300; transition: color 0.2s;
    }
    .footer-col ul li a:hover { color: var(--gold); }
    .footer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: rgba(250,246,239,0.25); font-weight: 300;
      letter-spacing: 0.08em;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed; inset: 0; background: rgba(26,20,16,0.95);
      z-index: 1000; display: none; place-items: center;
      opacity: 0; transition: opacity 0.3s;
    }
    #lightbox.open { display: grid; opacity: 1; }
    #lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; }
    #lightbox-close {
      position: absolute; top: 28px; right: 36px;
      color: var(--gold); font-size: 1.8rem; cursor: none;
      line-height: 1; background: none; border: none;
      font-family: 'Jost'; transition: opacity 0.2s;
    }
    #lightbox-close:hover { opacity: 0.6; }

    /* ── FADE-IN ANIMATIONS ── */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s, transform 0.7s; }
    .reveal.visible { opacity: 1; transform: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      #hero { grid-template-columns: 1fr; }
      .hero-right { height: 55vw; }
      #story { grid-template-columns: 1fr; }
      .story-img-stack { height: 320px; }
      .steps-grid { grid-template-columns: repeat(2, 1fr); }
      .footer-top { grid-template-columns: 1fr 1fr; }
      .masonry-grid { columns: 3; }
    }
    @media (max-width: 768px) {
      section { padding: 72px 28px; }
      nav { padding: 18px 28px; }
      nav.scroll
